name = "bookmark-dashboard"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
binding = "ASSETS"
directory = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "bookmark-dashboard"
database_id = "REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "PREFERENCES"
id = "REPLACE_WITH_CLOUDFLARE_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "SESSION"
id = "REPLACE_WITH_CLOUDFLARE_SESSION_KV_NAMESPACE_ID"

# OIDC non-secret variables belong in [vars]. Store OIDC_CLIENT_SECRET with
# `npx wrangler secret put OIDC_CLIENT_SECRET`. See README.md for all options.
# Store the browser extension token with
# `npx wrangler secret put EXTENSION_API_TOKEN`.
