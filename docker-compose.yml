services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "${CONTAINER_NAME:-Okini}"
    ports:
      # Set PORT in .env to change the host port. The container keeps Wrangler's default.
      - "${PORT:-8787}:8787"
    volumes:
      # Persist local D1 database and KV state across restarts
      - wrangler_data:/app/.wrangler
      # To trust a private CA, uncomment this mount and CUSTOM_CA_CERT below.
      # - ./custom-ca.crt:/certs/custom-ca.crt:ro
    environment:
      # ── Optional OIDC settings ──────────────────────────────────────────────
      # Uncomment and fill these in when you want OIDC protection.
      # Non-secret values only; keep OIDC_CLIENT_SECRET in a .env file
      # (see the .env.example at the repo root) and never commit it.
      #
      # OIDC_ISSUER_URL: "https://identity.example.com/"
      # OIDC_CLIENT_ID: "bookmark-dashboard"
      # OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET}"
      # OIDC_SCOPES: "openid profile email"
      # OIDC_ALLOWED_EMAILS: "you@example.com"
      # AUTH_SESSION_TTL_SECONDS: "28800"

      # ── Optional browser extension access ──────────────────────────────────
      # EXTENSION_API_TOKEN: "${EXTENSION_API_TOKEN}"

      # CUSTOM_CA_CERT: "/certs/custom-ca.crt"

      # NODE_ENV is informational; wrangler local mode ignores it.
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8787/api/folders > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  wrangler_data:
    driver: local
